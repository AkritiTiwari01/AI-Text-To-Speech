<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Text to Speech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d12;
        --surface: #14141d;
        --card: #1a1a27;
        --border: rgba(255, 255, 255, 0.07);
        --accent: #7b6ef6;
        --accent2: #e06bf0;
        --text: #f0eff8;
        --muted: #7a788f;
        --success: #4ade80;
        --danger: #f87171;
        --radius: 14px;
        --glow: 0 0 30px rgba(123, 110, 246, 0.18);
      }

      body {
        min-height: 100vh;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        padding: 24px;
        background-image:
          radial-gradient(
            ellipse 60% 50% at 20% 20%,
            rgba(123, 110, 246, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 50% 40% at 80% 80%,
            rgba(224, 107, 240, 0.06) 0%,
            transparent 60%
          );
      }

      .container {
        width: 100%;
        max-width: 460px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px;
        box-shadow:
          var(--glow),
          0 24px 60px rgba(0, 0, 0, 0.5);
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }
      .header-icon {
        width: 42px;
        height: 42px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      .header h1 {
        font-family: "Syne", sans-serif;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.3px;
        color: var(--text);
      }
      .header p {
        font-size: 12px;
        color: var(--muted);
        margin-top: 1px;
      }

      /* ── Label ── */
      .field-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }

      /* ── Textarea ── */
      .textarea-wrap {
        position: relative;
        margin-bottom: 20px;
      }
      textarea {
        width: 100%;
        height: 120px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        color: var(--text);
        resize: none;
        outline: none;
        line-height: 1.6;
        transition: border-color 0.2s;
      }
      textarea::placeholder {
        color: var(--muted);
        opacity: 0.7;
      }
      textarea:focus {
        border-color: rgba(123, 110, 246, 0.5);
      }

      .char-count {
        position: absolute;
        bottom: 10px;
        right: 12px;
        font-size: 11px;
        color: var(--muted);
        pointer-events: none;
      }
      .char-count.warn {
        color: var(--danger);
      }

      /* ── Select ── */
      .select-wrap {
        position: relative;
        margin-bottom: 20px;
      }
      .select-wrap::after {
        content: "▾";
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
        font-size: 13px;
      }
      select {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 11px 36px 11px 14px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        color: var(--text);
        outline: none;
        appearance: none;
        cursor: pointer;
        transition: border-color 0.2s;
      }
      select:focus {
        border-color: rgba(123, 110, 246, 0.5);
      }
      select option {
        background: #1a1a27;
      }

      /* ── Effect Pills ── */
      .effects-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      .effect-pill {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 9px 6px;
        text-align: center;
        cursor: pointer;
        transition: all 0.18s ease;
        font-family: "DM Sans", sans-serif;
      }
      .effect-pill .pill-icon {
        font-size: 18px;
        display: block;
        margin-bottom: 3px;
      }
      .effect-pill .pill-label {
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
      }
      .effect-pill:hover {
        border-color: rgba(123, 110, 246, 0.4);
        background: rgba(123, 110, 246, 0.06);
      }
      .effect-pill.active {
        border-color: var(--accent);
        background: rgba(123, 110, 246, 0.12);
        box-shadow: 0 0 0 1px rgba(123, 110, 246, 0.3);
      }
      .effect-pill.active .pill-label {
        color: var(--accent);
      }

      /* ── Sliders ── */
      .sliders {
        margin-bottom: 22px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .slider-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .slider-row .s-label {
        font-size: 13px;
        color: var(--muted);
        width: 44px;
        flex-shrink: 0;
      }
      .slider-row input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--border);
        outline: none;
        cursor: pointer;
        position: relative;
      }
      .slider-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        cursor: pointer;
        border: 2px solid var(--bg);
        transition: transform 0.15s;
        box-shadow: 0 0 8px rgba(123, 110, 246, 0.5);
      }
      .slider-row input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      .slider-row .s-val {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        width: 30px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      /* ── Waveform Visualizer ── */
      .wave-wrap {
        height: 48px;
        background: var(--surface);
        border-radius: var(--radius);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .wave-bar {
        width: 3px;
        border-radius: 2px;
        background: linear-gradient(to top, var(--accent), var(--accent2));
        height: 4px;
        transition: height 0.1s ease;
        opacity: 0.4;
      }
      .wave-wrap.active .wave-bar {
        opacity: 1;
        animation: wave var(--dur, 0.8s) ease-in-out infinite alternate;
      }
      @keyframes wave {
        from {
          height: 4px;
        }
        to {
          height: var(--h, 28px);
        }
      }
      .wave-idle-text {
        font-size: 12px;
        color: var(--muted);
      }

      /* ── Speak Button ── */
      .speak-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: var(--radius);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        font-family: "Syne", sans-serif;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.3px;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
      }
      .speak-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0);
        transition: background 0.2s;
      }
      .speak-btn:hover::after {
        background: rgba(255, 255, 255, 0.08);
      }
      .speak-btn:active {
        transform: scale(0.98);
      }
      .speak-btn.speaking {
        background: linear-gradient(135deg, #f87171, #fb923c);
      }
      .speak-btn .btn-icon {
        font-size: 18px;
      }

      /* ── Status bar ── */
      .status-bar {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
        transition: color 0.2s;
      }
      .status-bar.ok {
        color: var(--success);
      }
      .status-bar.err {
        color: var(--danger);
      }

      /* ── Divider ── */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="header-icon">🎙️</div>
        <div>
          <h1>Text to Speech</h1>
          <p>Powered by Web Speech API</p>
        </div>
      </div>

      <!-- Text Input -->
      <div class="field-label">Your Text</div>
      <div class="textarea-wrap">
        <textarea
          id="textInput"
          placeholder="Type or paste your text here..."
          maxlength="500"
        ></textarea>
        <span class="char-count" id="charCount">0 / 500</span>
      </div>

      <!-- Voice Select -->
      <div class="field-label">Voice</div>
      <div class="select-wrap">
        <select id="selectVoice"></select>
      </div>

      <!-- Voice Effects -->
      <div class="field-label">Voice Effect</div>
      <div class="effects-grid" id="effectsGrid">
        <div class="effect-pill active" data-effect="default">
          <span class="pill-icon">🎵</span>
          <span class="pill-label">Default</span>
        </div>
        <div class="effect-pill" data-effect="male">
          <span class="pill-icon">🎤</span>
          <span class="pill-label">Male</span>
        </div>
        <div class="effect-pill" data-effect="female">
          <span class="pill-icon">💬</span>
          <span class="pill-label">Female</span>
        </div>
        <div class="effect-pill" data-effect="child">
          <span class="pill-icon">⭐</span>
          <span class="pill-label">Child</span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Sliders -->
      <div class="field-label">Fine-Tune</div>
      <div class="sliders">
        <div class="slider-row">
          <span class="s-label">Pitch</span>
          <input
            type="range"
            id="pitch"
            min="0.5"
            max="2"
            step="0.1"
            value="1"
          />
          <span class="s-val" id="pitchVal">1.0</span>
        </div>
        <div class="slider-row">
          <span class="s-label">Speed</span>
          <input
            type="range"
            id="rate"
            min="0.5"
            max="2"
            step="0.1"
            value="1"
          />
          <span class="s-val" id="rateVal">1.0</span>
        </div>
      </div>

      <!-- Waveform -->
      <div class="wave-wrap" id="waveWrap">
        <span class="wave-idle-text" id="waveIdle"
          >Waveform will appear here</span
        >
      </div>

      <!-- Speak Button -->
      <button class="speak-btn" id="speakBtn">
        <span class="btn-icon" id="btnIcon">🔊</span>
        <span id="btnLabel">Speak</span>
      </button>

      <div class="status-bar" id="statusBar">Ready</div>
    </div>

    <script>
      /* ── Elements ── */
      const textInput = document.getElementById("textInput");
      const charCount = document.getElementById("charCount");
      const selectVoice = document.getElementById("selectVoice");
      const effectsGrid = document.getElementById("effectsGrid");
      const pitchSlider = document.getElementById("pitch");
      const rateSlider = document.getElementById("rate");
      const pitchVal = document.getElementById("pitchVal");
      const rateVal = document.getElementById("rateVal");
      const speakBtn = document.getElementById("speakBtn");
      const btnIcon = document.getElementById("btnIcon");
      const btnLabel = document.getElementById("btnLabel");
      const statusBar = document.getElementById("statusBar");
      const waveWrap = document.getElementById("waveWrap");
      const waveIdle = document.getElementById("waveIdle");

      /* ── Effect presets ── */
      const EFFECTS = {
        default: { pitch: 1.0, rate: 1.0 },
        male: { pitch: 0.5, rate: 0.9 },
        female: { pitch: 1.3, rate: 0.9 },
        child: { pitch: 1.7, rate: 0.9 },
      };

      let voices = [];
      let activeEffect = "default";
      let waveBars = [];

      /* ── Build waveform bars ── */
      waveIdle.remove();
      const BAR_COUNT = 32;
      for (let i = 0; i < BAR_COUNT; i++) {
        const b = document.createElement("div");
        b.className = "wave-bar";
        const h = 4 + Math.random() * 24;
        const dur = (0.5 + Math.random() * 0.7).toFixed(2);
        b.style.setProperty("--h", h + "px");
        b.style.setProperty("--dur", dur + "s");
        b.style.animationDelay = (Math.random() * 0.5).toFixed(2) + "s";
        waveWrap.appendChild(b);
        waveBars.push(b);
      }

      /* ── Char counter ── */
      textInput.addEventListener("input", () => {
        const len = textInput.value.length;
        charCount.textContent = `${len} / 500`;
        charCount.classList.toggle("warn", len > 450);
      });

      /* ── Populate voice list ── */
      function populateVoiceList() {
        voices = speechSynthesis.getVoices();
        if (!voices.length) return;
        selectVoice.innerHTML = "";
        voices.forEach((v) => {
          const o = document.createElement("option");
          o.value = v.name;
          o.textContent = `${v.name} (${v.lang})`;
          selectVoice.appendChild(o);
        });
        const preferred =
          voices.find((v) => v.name.includes("Google") && v.lang === "en-US") ||
          voices.find((v) => v.lang.startsWith("en")) ||
          voices[0];
        if (preferred) selectVoice.value = preferred.name;
      }

      speechSynthesis.onvoiceschanged = populateVoiceList;
      populateVoiceList();

      /* ── Effect pill click ── */
      effectsGrid.addEventListener("click", (e) => {
        const pill = e.target.closest(".effect-pill");
        if (!pill) return;
        document
          .querySelectorAll(".effect-pill")
          .forEach((p) => p.classList.remove("active"));
        pill.classList.add("active");
        activeEffect = pill.dataset.effect;
        const preset = EFFECTS[activeEffect];
        pitchSlider.value = preset.pitch;
        rateSlider.value = preset.rate;
        pitchVal.textContent = preset.pitch.toFixed(1);
        rateVal.textContent = preset.rate.toFixed(1);
      });

      /* ── Slider live update ── */
      pitchSlider.addEventListener("input", () => {
        pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(1);
        clearEffectSelection();
      });
      rateSlider.addEventListener("input", () => {
        rateVal.textContent = parseFloat(rateSlider.value).toFixed(1);
        clearEffectSelection();
      });

      function clearEffectSelection() {
        document
          .querySelectorAll(".effect-pill")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelector('.effect-pill[data-effect="default"]')
          .classList.add("active");
        activeEffect = "default";
      }

      /* ── Speak ── */
      speakBtn.addEventListener("click", () => {
        if (speechSynthesis.speaking) {
          speechSynthesis.cancel();
          setSpeaking(false);
          return;
        }

        const text = textInput.value.trim();
        if (!text) {
          setStatus("Please enter some text first.", "err");
          textInput.focus();
          return;
        }

        const utterance = new SpeechSynthesisUtterance(text);
        const voice = voices.find((v) => v.name === selectVoice.value);
        if (voice) utterance.voice = voice;
        utterance.pitch = parseFloat(pitchSlider.value);
        utterance.rate = parseFloat(rateSlider.value);

        utterance.onstart = () => {
          setSpeaking(true);
          setStatus("Speaking...", "ok");
        };
        utterance.onend = () => {
          setSpeaking(false);
          setStatus("Done ✓", "ok");
          setTimeout(() => setStatus("Ready", ""), 2500);
        };
        utterance.onerror = (e) => {
          setSpeaking(false);
          setStatus("Error: " + (e.error || "unknown"), "err");
        };

        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
      });

      function setSpeaking(active) {
        speakBtn.classList.toggle("speaking", active);
        waveWrap.classList.toggle("active", active);
        btnIcon.textContent = active ? "⏹" : "🔊";
        btnLabel.textContent = active ? "Stop" : "Speak";
      }

      function setStatus(msg, type) {
        statusBar.textContent = msg;
        statusBar.className = "status-bar" + (type ? " " + type : "");
      }
    </script>
  </body>
</html>
